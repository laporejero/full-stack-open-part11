name: Deployment pipeline

on:
    push:
        branches:
            - main
    pull_request:
        branches: [main]
        types: [opened, synchronize]

jobs:
    build_and_test:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v6
        - uses: actions/setup-node@v6
          with:
            node-version: '24'
        - name: Install dependencies
          run: npm install
        - name: Check style
          run: npm run eslint
        - name: Run npm test
          run: npm run test
        - name: Run npm run build
          run: npm run build
        - name: Install Playwright browsers
          run: npx playwright install --with-deps
        - name: Run Playwright tests
          run: npm run test:e2e

    deploy:
      if: ${{ github.event_name == 'push' && !contains(join(github.event.commits.*.message, ' '), '#skip') }}
      needs: [build_and_test]
      runs-on: ubuntu-latest
      steps:
        - name: Trigger deployment
          run: curl ${{ secrets.RENDER_DEPLOY_HOOK }}
    
    tag_release:
      if: ${{ github.event_name == 'push' && !contains(join(github.event.commits.*.message, ' '), '#skip') }}
      needs: [deploy]
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v6
        - name: Bump version and push tag
          uses: anothrNick/github-tag-action@4ed44965e0db8dab2b466a16da04aec3cc312fd8
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            DEFAULT_BUMP: patch

    notify-success:
      if: ${{ success() }}
      needs: [build_and_test, deploy]
      runs-on: ubuntu-latest
      steps:
        - name: Deployment Successful
          uses: sarisia/actions-status-discord@v1
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
            DISCORD_TITLE: "Deployment Successful!"
            DISCORD_COLOR: ${{ job.status }}
            DISCORD_DESCRIPTION: |
              A new version has been deployed to Render.

              Repository: ${{ github.repository }}
              Branch: ${{ github.ref_name }}
              Commit: ${{ github.sha }}
              Author: ${{ github.actor }}

              Workflow Run:
              ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    
    notify-failure:
      if: ${{ failure() }}
      needs: [build_and_test, deploy]
      runs-on: ubuntu-latest
      steps:
        - name: Deployment Pipeline Failed
          uses: sarisia/actions-status-discord@v1
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
            DISCORD_TITLE: "Deployment Pipeline Failed"
            DISCORD_COLOR: ${{ job.status }}
            DISCORD_DESCRIPTION: |
              The deployment pipeline failed.

              Repository: ${{ github.repository }}
              Commit: ${{ github.sha }}
              Triggered by: ${{ github.actor }}

              Workflow:
              ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    